name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    name: Unit tests / ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # better-sqlite3 ships no Node-20 Windows prebuilt (lowest win32-x64 node
      # prebuilt is the Node-22 ABI), so on this cell npm must compile it from
      # source. Node 20's bundled npm carries node-gyp@10.1.0, whose PowerShell
      # Visual Studio finder crashes with ERR_CHILD_PROCESS_STDIO_MAXBUFFER on the
      # runner's VS 2026 ("18") install and reports "unknown version undefined" —
      # the bug fixed in node-gyp >=10.2. Refresh npm (which carries a modern
      # node-gyp) so the native build can find the toolchain. Windows-only; the
      # other matrix cells either find a prebuilt or have a working compiler.
      - name: Modernize node-gyp toolchain (Windows)
        if: runner.os == 'Windows'
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit

  integration:
    name: Integration tests (Docker / Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:int
